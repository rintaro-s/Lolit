<!DOCTYPE html>
<html lang="ja" x-data="lolit()" x-init="initApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolit</title>
    <link rel="stylesheet" href="/static/app.css">
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
</head>
<body>

    <!-- Login / first-run setup -->
    <template x-if="!authed">
        <div class="login-screen">
            <div class="login-card">
                <div class="logo-area"><div class="logo-shape"></div><span>Lolit</span></div>
                <h1 x-text="mode === 'login' ? 'ログイン' : '管理者アカウントの作成'"></h1>
                <p class="subtitle" x-text="mode === 'login' ? '部内ファイル共有 + Git履歴管理' : '初回セットアップ：最初のアカウントは自動的に管理者になります'"></p>
                <div class="error-box" x-show="loginError" x-text="loginError"></div>

                <label>ユーザー名</label>
                <input type="text" class="text-input" x-model="loginForm.username" @keydown.enter="mode === 'login' ? doLogin() : doRegister()">
                <template x-if="mode === 'register'">
                    <div>
                        <label>表示名</label>
                        <input type="text" class="text-input" x-model="loginForm.display_name" placeholder="任意">
                    </div>
                </template>
                <label>パスワード（8文字以上）</label>
                <input type="password" class="text-input" x-model="loginForm.password" @keydown.enter="mode === 'login' ? doLogin() : doRegister()">

                <button class="action-btn btn-primary" @click="mode === 'login' ? doLogin() : doRegister()" x-text="mode === 'login' ? 'ログイン' : '作成してはじめる'"></button>

                <div class="switch-mode">
                    <template x-if="mode === 'login'">
                        <span>はじめて使いますか？ <a @click="mode = 'register'; loginError = ''">管理者アカウントを作成</a></span>
                    </template>
                    <template x-if="mode === 'register'">
                        <span><a @click="mode = 'login'; loginError = ''">ログイン画面に戻る</a></span>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- Main app -->
    <template x-if="authed">
        <div style="display:flex; width:100%;">
            <!-- サイドバー: リポジトリ一覧 -->
            <aside class="sidebar">
                <div class="logo-area">
                    <div class="logo-shape"></div>
                    <span>Lolit</span>
                </div>

                <input type="text" class="repo-search" placeholder="リポジトリを検索" x-model="repoFilter">

                <ul class="repo-list">
                    <template x-for="r in filteredRepos()" :key="r">
                        <li class="repo-item" :class="{active: r === repo}" @click="selectRepo(r)">
                            <span class="repo-icon">⌥</span>
                            <span x-text="r"></span>
                        </li>
                    </template>
                    <li class="empty-repos" x-show="repos.length === 0">
                        リポジトリがまだありません。Gitea でリポジトリを作成し、
                        <code>loli clone</code> または <code>git push</code> してください。
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <div class="user-chip">
                        <div class="avatar" x-text="initials(currentUser.display_name || currentUser.username)"></div>
                        <div>
                            <div class="user-chip-name" x-text="currentUser.display_name || currentUser.username"></div>
                            <div class="user-chip-role" x-text="currentUser.role === 'admin' ? '管理者' : 'メンバー'"></div>
                        </div>
                        <div class="user-chip-actions">
                            <button class="icon-btn-text" title="ログアウト" @click="doLogout">⏻</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- メイン -->
            <main class="main-container">
                <header class="header">
                    <div class="repo-heading">
                        <template x-if="repo">
                            <h1><span class="repo-owner" x-text="repoOwner(repo) + ' / '"></span><span x-text="repoName(repo)"></span></h1>
                        </template>
                        <template x-if="!repo"><h1>リポジトリを選択してください</h1></template>
                    </div>
                    <div class="header-actions">
                        <div class="global-search">
                            <input type="text" placeholder="全リポジトリを検索" x-model="query" @keydown.enter="doSearch">
                        </div>
                    </div>
                </header>

                <nav class="tab-bar" x-show="repo">
                    <div class="tab-item" :class="{active: tab === 'code'}" @click="switchTab('code')">📁 コード</div>
                    <div class="tab-item" :class="{active: tab === 'commits'}" @click="switchTab('commits')">🕒 コミット <span class="tab-badge" x-text="commits.length" x-show="commits.length"></span></div>
                    <div class="tab-item" :class="{active: tab === 'locks'}" @click="switchTab('locks')">🔒 ロック中 <span class="tab-badge" x-text="repoLocks().length" x-show="repoLocks().length"></span></div>
                    <div class="tab-item" :class="{active: tab === 'releases'}" @click="switchTab('releases')">🏷 リリース</div>
                    <div class="tab-item" :class="{active: tab === 'search'}" @click="switchTab('search')" x-show="searchResults.length">🔍 検索結果</div>
                    <div class="tab-item" :class="{active: tab === 'members'}" @click="switchTab('members')" x-show="currentUser.role === 'admin'">👥 メンバー</div>
                </nav>

                <div class="content-body" x-show="repo">
                    <!-- Code -->
                    <section x-show="tab === 'code'">
                        <div class="breadcrumb">
                            <a @click="navigateTo('')" x-text="repo"></a>
                            <template x-for="(seg, i) in pathSegments()" :key="i">
                                <span><span class="sep">/</span> <a @click="navigateTo(pathUpTo(i))" x-text="seg"></a></span>
                            </template>
                        </div>

                        <div class="dropzone"
                             :class="{'drag-over': dragOver}"
                             @dragover.prevent="dragOver = true"
                             @dragleave.prevent="dragOver = false"
                             @drop.prevent="onDrop($event)"
                             @click="$refs.fileInput.click()">
                            <strong>ファイルをドラッグ&ドロップ</strong> するか、クリックして選択（Gitを使わなくてもOK）
                            <input type="file" x-ref="fileInput" multiple @change="onFilePick($event)">
                        </div>

                        <div class="file-table-wrap">
                            <table class="file-table">
                                <thead>
                                    <tr><th>名前</th><th>最新コミット</th><th>ロック</th><th></th></tr>
                                </thead>
                                <tbody>
                                    <template x-for="entry in currentTree()" :key="entry.key">
                                        <tr @click="entry.isDir ? navigateTo(entry.path) : openFile(entry.file)">
                                            <td>
                                                <div class="file-name-cell">
                                                    <span class="icon-type" :class="entry.isDir ? 'icon-folder' : iconClass(entry.file.file_type)"
                                                          x-text="entry.isDir ? '📁' : iconFor(entry.file.file_type)"></span>
                                                    <span x-text="entry.name"></span>
                                                </div>
                                            </td>
                                            <td><code x-text="entry.isDir ? '' : (entry.file.latest_commit||'').substring(0,8)"></code></td>
                                            <td>
                                                <span x-show="!entry.isDir && entry.file.locked_by" class="lock-badge" x-text="'🔒 ' + (entry.file.locked_by||'')"></span>
                                            </td>
                                            <td style="text-align:right" @click.stop="!entry.isDir && toggleLock(entry.file)">
                                                <button x-show="!entry.isDir" class="action-btn small" x-text="entry.file && entry.file.locked_by ? '解除' : 'ロック'" :class="{danger: entry.file && entry.file.locked_by}"></button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div class="empty" x-show="currentTree().length === 0">
                            <div class="empty-icon">📂</div>
                            このフォルダは空です。上のドロップゾーンからファイルを追加できます。
                        </div>
                    </section>

                    <!-- Commits -->
                    <section x-show="tab === 'commits'">
                        <div class="title-section"><h2>コミット履歴</h2></div>
                        <ul class="history-list">
                            <template x-for="c in commits" :key="c.hash">
                                <li>
                                    <div class="history-msg" x-text="c.message"></div>
                                    <div class="history-meta"><code class="history-hash" x-text="c.hash.substring(0,8)"></code> · <span x-text="c.author"></span> · <span x-text="formatTime(c.ts)"></span></div>
                                </li>
                            </template>
                        </ul>
                        <p class="empty" x-show="commits.length === 0">まだコミットがありません。</p>
                    </section>

                    <!-- Locks -->
                    <section x-show="tab === 'locks'">
                        <div class="title-section"><h2>このリポジトリのロック中ファイル</h2></div>
                        <div class="file-table-wrap">
                            <table class="file-table">
                                <thead><tr><th>ファイル</th><th>ユーザー</th><th></th></tr></thead>
                                <tbody>
                                    <template x-for="f in repoLocks()" :key="f.id">
                                        <tr>
                                            <td x-text="f.path"></td>
                                            <td x-text="f.locked_by"></td>
                                            <td style="text-align:right"><button class="action-btn danger small" @click="forceUnlock(f)">強制解除</button></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <p class="empty" x-show="repoLocks().length === 0">現在ロックされているファイルはありません。</p>
                    </section>

                    <!-- Releases -->
                    <section x-show="tab === 'releases'">
                        <div class="title-section"><h2>リリース</h2><button class="action-btn" @click="showRelease = true">新規リリース</button></div>
                        <div class="file-table-wrap">
                            <table class="file-table">
                                <thead><tr><th>タグ</th><th>コミット</th><th>メモ</th><th>日時</th></tr></thead>
                                <tbody>
                                    <template x-for="r in releases" :key="r.tag">
                                        <tr><td x-text="r.tag"></td><td><code x-text="r.commit_hash.substring(0,8)"></code></td><td x-text="r.note"></td><td x-text="formatTime(r.ts)"></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <p class="empty" x-show="releases.length === 0">まだリリースがありません。</p>
                    </section>

                    <!-- Search -->
                    <section x-show="tab === 'search'">
                        <div class="title-section"><h2>検索結果</h2></div>
                        <p class="result-count" x-show="searchResults.length" x-text="searchResults.length + ' 件見つかりました'"></p>
                        <div class="file-table-wrap">
                            <table class="file-table">
                                <thead><tr><th>ファイル</th><th>種別</th><th>スコア</th></tr></thead>
                                <tbody>
                                    <template x-for="h in searchResults" :key="h.id">
                                        <tr><td x-text="h.id"></td><td x-text="h.fields?.type"></td><td x-text="h.score.toFixed(2)"></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <p class="empty" x-show="searchResults.length === 0">結果がありません。</p>
                    </section>

                    <!-- Members (admin only) -->
                    <section x-show="tab === 'members'">
                        <div class="title-section"><h2>メンバー管理</h2><button class="action-btn" @click="showInvite = true">メンバーを追加</button></div>
                        <div class="file-table-wrap">
                            <table class="file-table">
                                <thead><tr><th>ユーザー名</th><th>表示名</th><th>権限</th><th></th></tr></thead>
                                <tbody>
                                    <template x-for="m in members" :key="m.id">
                                        <tr>
                                            <td x-text="m.username"></td>
                                            <td x-text="m.display_name"></td>
                                            <td>
                                                <select class="role-select" x-model="m.role" @change="changeRole(m)">
                                                    <option value="member">メンバー</option>
                                                    <option value="admin">管理者</option>
                                                </select>
                                            </td>
                                            <td style="text-align:right">
                                                <button class="action-btn danger small" @click="removeMember(m)" x-show="m.id !== currentUser.id">削除</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="empty" x-show="!repo && repos.length > 0" style="margin-top:60px">
                    左のリストからリポジトリを選んでください。
                </div>
            </main>
        </div>
    </template>

    <!-- Upload confirmation modal -->
    <div class="modal" x-show="showUploadConfirm" x-transition @click.self="cancelUpload">
        <div class="modal-card">
            <h2>アップロード内容の確認</h2>
            <label>コミットメッセージ</label>
            <input type="text" class="text-input" x-model="uploadMessage" placeholder="例: 部品を追加">
            <label>アップロードするファイル (<span x-text="pendingUploads.length"></span>)</label>
            <template x-for="(u, i) in pendingUploads" :key="i">
                <div class="upload-file-row">
                    <span x-text="u.path"></span>
                    <button @click="pendingUploads.splice(i,1)">×</button>
                </div>
            </template>
            <p x-show="uploadError" class="error-box" x-text="uploadError" style="margin-top:12px"></p>
            <div class="modal-actions">
                <button class="action-btn" @click="cancelUpload">キャンセル</button>
                <button class="action-btn btn-primary" @click="confirmUpload" :disabled="uploading" x-text="uploading ? 'アップロード中...' : 'アップロード'"></button>
            </div>
        </div>
    </div>

    <div class="modal" x-show="showRelease" x-transition @click.self="showRelease = false">
        <div class="modal-card">
            <h2>新規リリース</h2>
            <label>タグ</label>
            <input type="text" x-model="newRelease.tag" class="text-input" placeholder="v1.0">
            <label>コミット</label>
            <input type="text" x-model="newRelease.commit" class="text-input" placeholder="abc123">
            <label>メモ</label>
            <input type="text" x-model="newRelease.note" class="text-input">
            <div class="modal-actions">
                <button class="action-btn" @click="showRelease = false">キャンセル</button>
                <button class="action-btn btn-primary" @click="createRelease">作成</button>
            </div>
        </div>
    </div>

    <div class="modal" x-show="showInvite" x-transition @click.self="showInvite = false">
        <div class="modal-card">
            <h2>メンバーを追加</h2>
            <label>ユーザー名</label>
            <input type="text" x-model="inviteForm.username" class="text-input">
            <label>表示名</label>
            <input type="text" x-model="inviteForm.display_name" class="text-input">
            <label>初期パスワード（8文字以上）</label>
            <input type="text" x-model="inviteForm.password" class="text-input">
            <p x-show="inviteError" class="error-box" x-text="inviteError" style="margin-top:12px"></p>
            <div class="modal-actions">
                <button class="action-btn" @click="showInvite = false">キャンセル</button>
                <button class="action-btn btn-primary" @click="createMember">追加</button>
            </div>
        </div>
    </div>

    <!-- File detail panel -->
    <div class="drawer" :class="{open: selectedFile}">
        <template x-if="selectedFile">
            <div>
                <div class="drawer-header">
                    <h3 x-text="selectedFile.path"></h3>
                    <button class="icon-btn-text" @click="selectedFile = null">×</button>
                </div>
                <p x-text="selectedFile.file_type" class="drawer-type"></p>
                <p>最新バージョン: <code x-text="(selectedFile.latest_commit||'').substring(0,8)"></code></p>
                <p x-show="selectedFile.locked_by" x-text="'🔒 ' + selectedFile.locked_by"></p>

                <div class="drawer-section" style="display:flex; gap:8px;">
                    <button class="action-btn" @click="downloadVersion(selectedFile.path, selectedFile.latest_commit)">最新版をダウンロード</button>
                    <button class="action-btn" x-show="selectedFile.file_type === 'sldasm'" @click="downloadBundle(selectedFile.path, selectedFile.latest_commit)">関連部品も含めてダウンロード</button>
                </div>

                <template x-if="parsedKicadDiff()">
                    <div class="drawer-section">
                        <h4>KiCAD 部品差分</h4>
                        <ul class="diff-list">
                            <template x-for="c in (parsedKicadDiff().added || [])" :key="'a'+c.ref">
                                <li><span class="diff-tag add">追加</span> <span x-text="c.ref + ' ' + (c.footprint||c.value||'')"></span></li>
                            </template>
                            <template x-for="c in (parsedKicadDiff().removed || [])" :key="'r'+c.ref">
                                <li><span class="diff-tag del">削除</span> <span x-text="c.ref + ' ' + (c.footprint||c.value||'')"></span></li>
                            </template>
                            <template x-for="c in (parsedKicadDiff().changed || [])" :key="'c'+c.ref">
                                <li><span class="diff-tag chg">変更</span> <span x-text="c.ref + ' ' + (c.footprint||c.value||'')"></span></li>
                            </template>
                        </ul>
                    </div>
                </template>

                <template x-if="fileDetail.sw_metadata">
                    <div class="drawer-section">
                        <h4>SolidWorks メタデータ</h4>
                        <pre class="diff-box" x-text="JSON.stringify(fileDetail.sw_metadata, null, 2)"></pre>
                    </div>
                </template>

                <div class="drawer-section">
                    <h4>このファイルのバージョン履歴</h4>
                    <ul class="history-list">
                        <template x-for="c in fileHistory" :key="c.hash">
                            <li style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
                                <div>
                                    <div class="history-msg" x-text="c.message"></div>
                                    <div class="history-meta"><code class="history-hash" x-text="c.hash.substring(0,8)"></code> · <span x-text="c.author"></span> · <span x-text="formatTime(c.ts)"></span></div>
                                </div>
                                <button class="action-btn small" @click="downloadVersion(selectedFile.path, c.hash)">DL</button>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </template>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
